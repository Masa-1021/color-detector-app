apiVersion: v1
kind: ConfigMap
metadata:
  name: app-settings
  namespace: circle-detector
data:
  settings.json: |
    {
      "version": "2.0",
      "device_mode": "child",
      "device_mode_confirmed": true,
      "station": {
        "sta_no1": "SAND",
        "sta_no1_options": ["SAND", "HIME"],
        "sta_no2": "LINE01"
      },
      "mqtt": {
        "broker": "mosquitto",
        "port": 1883,
        "topic": "equipment/status",
        "client_id": "color_detector",
        "enabled": true
      },
      "oracle": {
        "enabled": true,
        "table_name": "HF1RCM01"
      },
      "blink_detection": {
        "window_ms": 2000,
        "min_changes": 3,
        "min_interval_ms": 100,
        "max_interval_ms": 1500
      }
    }
