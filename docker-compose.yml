services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: "no"
    profiles: ["ui", "runtime"]

  # 設定UI（Flask）: キャリブレーション・設定編集専用
  config-ui:
    build:
      context: .
      dockerfile: Dockerfile.detector
    ports:
      - "5000:5000"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./circle_detector:/app/circle_detector:ro
      - ${CONFIG_DIR:-./config}:/app/config
      - ./config:/app/config-root
      - shared-logs:/app/logs
      - /home/pi/oracle_wallet:/home/pi/oracle_wallet:ro
    environment:
      - MQTT_BROKER=mosquitto
      - CONFIG_PROFILE=${CONFIG_PROFILE:-default}
    depends_on:
      - mosquitto
    restart: "no"
    profiles: ["ui"]

  # 検出ランタイム（ヘッドレス）: 検出ループ + MQTT送信
  detector-runtime:
    build:
      context: .
      dockerfile: Dockerfile.runtime
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./circle_detector:/app/circle_detector:ro
      - ${CONFIG_DIR:-./config}:/app/config
      - shared-logs:/app/logs
    tmpfs:
      - /app/queue:size=50M,mode=1777
    environment:
      - MQTT_BROKER=mosquitto
    depends_on:
      - mosquitto
    restart: "no"
    profiles: ["runtime"]

  # MQTT-Oracle ブリッジ: 親機のみ
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.oracle-bridge
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config
      - bridge-queue:/app/queue
      - shared-logs:/app/logs
      - /home/pi/oracle_wallet:/home/pi/oracle_wallet:ro
    environment:
      - MQTT_BROKER=mosquitto
    depends_on:
      - mosquitto
    restart: "no"
    profiles: ["runtime"]

volumes:
  shared-logs:
  bridge-queue:
