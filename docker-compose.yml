services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped

  detector:
    build: .
    ports:
      - "5000:5000"
    devices:
      - /dev/video0:/dev/video0
    volumes:
      - ./circle_detector:/app/circle_detector:ro
      - ./config:/app/config
      - detector-queue:/app/queue
      - shared-logs:/app/logs
      - /run/circle-detector:/run/circle-detector
      - /home/pi/oracle_wallet:/home/pi/oracle_wallet:ro
    environment:
      - MQTT_BROKER=mosquitto
    depends_on:
      - mosquitto
    restart: unless-stopped

  bridge:
    build: .
    command: ["python3", "mqtt_oracle_bridge.py"]
    volumes:
      - ./config:/app/config
      - bridge-queue:/app/queue
      - shared-logs:/app/logs
      - /home/pi/oracle_wallet:/home/pi/oracle_wallet:ro
    environment:
      - MQTT_BROKER=mosquitto
    depends_on:
      - mosquitto
    restart: unless-stopped

volumes:
  detector-queue:
  shared-logs:
  bridge-queue:
