<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background rounded rectangle (browser window style) -->
  <rect x="8" y="8" width="112" height="112" rx="12" fill="#34495E"/>

  <!-- Browser title bar -->
  <rect x="8" y="8" width="112" height="24" rx="12" fill="#2C3E50"/>
  <rect x="8" y="20" width="112" height="12" fill="#2C3E50"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="20" r="5" fill="#E74C3C"/>
  <circle cx="40" cy="20" r="5" fill="#F1C40F"/>
  <circle cx="56" cy="20" r="5" fill="#2ECC71"/>

  <!-- Dashboard content area -->
  <rect x="16" y="40" width="96" height="72" rx="4" fill="#ECF0F1"/>

  <!-- Status indicators (3 boxes representing equipment) -->
  <rect x="22" y="48" width="26" height="26" rx="3" fill="#2ECC71"/>
  <rect x="51" y="48" width="26" height="26" rx="3" fill="#E74C3C"/>
  <rect x="80" y="48" width="26" height="26" rx="3" fill="#F1C40F"/>

  <!-- Labels under boxes -->
  <rect x="22" y="78" width="26" height="6" rx="2" fill="#BDC3C7"/>
  <rect x="51" y="78" width="26" height="6" rx="2" fill="#BDC3C7"/>
  <rect x="80" y="78" width="26" height="6" rx="2" fill="#BDC3C7"/>

  <!-- Bottom status bar -->
  <rect x="22" y="92" width="84" height="12" rx="3" fill="#3498DB"/>

  <!-- "5001" text hint -->
  <text x="64" cy="100" y="101" font-family="Arial, sans-serif" font-size="8" fill="white" text-anchor="middle">:5001</text>
</svg>
